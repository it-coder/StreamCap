name: Build Docker Image (x86) and Upload Artifact

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:      # 支持手动触发

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建 x86 镜像并导出为 tar 文件
      - name: Build Docker image (x86) and export
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          # 关键：不推送，而是导出到本地文件
          push: false
          load: true  # 加载镜像到本地 Docker 守护进程
          tags: streamcap-x86:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 将镜像保存为 tar 文件（压缩后体积更小）
      - name: Save image to tar file
        run: |
          docker save streamcap-x86:latest | gzip > streamcap-x86-image.tar.gz

      # 上传为 GitHub Actions 构建产物，供下载
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamcap-x86-image
          path: streamcap-x86-image.tar.gz
          retention-days: 7  # 保留天数，默认 90 天，可自行调整
