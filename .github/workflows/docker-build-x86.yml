name: Build and Push Docker Image to Alibaba Cloud ACR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 支持手动触发

env:
  # 使用你设置的密钥名称
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
  ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
  # 命名空间为 lih_hub，镜像名设为 streamcap（可自定义）
  ACR_NAMESPACE: lih_hub
  ACR_IMAGE_NAME: streamcap

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 设置Docker Buildx 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 使用你配置的密钥登录阿里云 ACR
      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ env.ALIYUN_USERNAME }}
          password: ${{ env.ALIYUN_PASSWORD }}

      # 生成 Docker 标签
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 完整镜像地址: registry地址/命名空间/镜像名
          images: ${{ env.ALIYUN_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      # 构建并推送镜像到 ACR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 如果 Dockerfile 不在根目录，请取消注释并修改
          # file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
